##### PREFIX #####

# Remap prefix from C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### GENERAL #####

# Faster key response
set -s escape-time 0

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Allow mouse support for selecting panes, resizing, scrolling, etc.
set -g mouse on

# Large scrollback history
set -g history-limit 100000

# Better terminal behavior / colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Use vi keys in copy mode
setw -g mode-keys vi

# Hide current window title
set -g status-left ""

set -g window-status-format "#I:#W"
set -g window-status-current-format "#[bold]#I:#W"

##### SPLITS #####

# Unbind defaults
unbind '"'
unbind %

# Split panes using - and _
# - = left/right split
# _ = top/bottom split
bind - split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# New window opens in the current pane's directory
bind c new-window -c "#{pane_current_path}"

##### PANE NAVIGATION #####

# Switch panes using vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using Shift + hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### WINDOW NAVIGATION #####

# Easier and faster switching between windows
bind C-p previous-window
bind C-n next-window
bind Tab last-window

##### COPY MODE #####

# Enter copy mode quickly
bind Enter copy-mode

# Vi-style copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

##### QUALITY OF LIFE #####

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Confirm before killing a pane
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane

# Confirm before killing a window
bind & confirm-before -p "Kill window #W? (y/n)" kill-window

##### STATUS / THEME #####

# Rose Pine for tmux
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main' # main, moon, dawn

# Show current folder in status bar
set -g @rose_pine_directory 'on'

# Keep only the window list in the status bar
set -g @rose_pine_only_windows 'on'

# Transparent / background-disabled status bar (good for Ghostty)
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# Window separator
set -g @rose_pine_window_status_separator ' | '

# Icons
set -g @rose_pine_session_icon ''
set -g @rose_pine_current_window_icon ''
set -g @rose_pine_folder_icon ''
set -g @rose_pine_username_icon ''
set -g @rose_pine_hostname_icon '󰒋'
set -g @rose_pine_date_time_icon '󰃰'

##### SESSION PERSISTENCE #####

set -g @continuum-restore 'on'

##### PLUGINS #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

##### TPM #####

if-shell '[ -f ~/.config/tukios-worktrees/tmux.conf ]' 'source-file ~/.config/tukios-worktrees/tmux.conf'

# Keep TPM near the bottom so plugin setup happens first
run '~/.tmux/plugins/tpm/tpm'

# Enforce a windows-only status bar after plugins load
set -g status-left ""
set -g status-right ""
