##### PREFIX #####

# Remap prefix from C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### GENERAL #####

# Faster key response
set -s escape-time 0

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Allow mouse support for selecting panes, resizing, scrolling, etc.
set -g mouse on

# Improve terminal/editor focus handling
set -g focus-events on

# Large scrollback history
set -g history-limit 100000

# Better terminal behavior / colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Use vi keys in copy mode
setw -g mode-keys vi

set -g window-status-format " #W "
set -g window-status-current-format " #W "

set -g status-left-length 0
set -g status-justify centre
set -g status-left ""

##### SPLITS #####

# Unbind defaults
unbind '"'
unbind %

# Split panes using - and _
# - = left/right split
# _ = top/bottom split
bind - split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# New window opens in the current pane's directory
bind c new-window -c "#{pane_current_path}"

##### PANE NAVIGATION #####

# Switch panes using vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using Shift + hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### WINDOW NAVIGATION #####

# Easier and faster switching between windows
bind C-p previous-window
bind C-n next-window
bind Tab last-window
bind-key w choose-tree -Zw
bind-key f command-prompt -p "Find window" "find-window '%%'"

# Surface background window activity
setw -g monitor-activity on

##### COPY MODE #####

# Enter copy mode quickly
bind Enter copy-mode

# Vi-style copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

##### QUALITY OF LIFE #####

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"


##### STATUS / THEME #####

# Rose Pine for tmux
# Tell plugin which configs to load
# set -g @dark-notify-theme-path-dark '~/.tmux/rosepine-dark.conf'
# set -g @dark-notify-theme-path-light '~/.tmux/rosepine-light.conf'
set-hook -g client-dark-theme {
  set -g @rose_pine_variant "main"
}
set-hook -g client-light-theme {
  set -g @rose_pine_variant "dawn"
}

# Show current folder in status bar
set -g @rose_pine_directory 'on'

# Window separator
set -g @rose_pine_window_status_separator ' '

# Icons
set -g @rose_pine_session_icon '' # Changes the default icon to the left of the session name
set -g @rose_pine_current_window_icon '' # Changes the default icon to the left of the active window name
set -g @rose_pine_folder_icon ''
set -g @rose_pine_username_icon ''
set -g @rose_pine_hostname_icon '󰒋'
set -g @rose_pine_date_time_icon '󰃰'

set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# Add to the beginning / end of the left and right sections your own.
set -g @rose_pine_status_left_prepend_section '#{tmux_mode_indicator}'

##### SESSION PERSISTENCE #####

set -g @continuum-restore 'on'

##### PLUGINS #####
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

##### TPM #####

# Keep TPM near the bottom so plugin setup happens first
run '~/.tmux/plugins/tpm/tpm'

