##### PREFIX #####

# Remap prefix from C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### GENERAL #####

# Faster key response
set -s escape-time 0

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Allow mouse support for selecting panes, resizing, scrolling, etc.
set -g mouse on

# Improve terminal/editor focus handling
set -g focus-events on

# Large scrollback history
set -g history-limit 100000

# Better terminal behavior / colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Use vi keys in copy mode
setw -g mode-keys vi

set -g window-status-format " #W "
set -g window-status-current-format " #[reverse]#I:#W "

##### SPLITS #####

# Unbind defaults
unbind '"'
unbind %

# Split panes using - and _
# - = left/right split
# _ = top/bottom split
bind - split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# New window opens in the current pane's directory
bind c new-window -c "#{pane_current_path}"

##### PANE NAVIGATION #####

# Switch panes using vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using Shift + hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### WINDOW NAVIGATION #####

# Easier and faster switching between windows
bind C-p previous-window
bind C-n next-window
bind Tab last-window
bind-key w choose-tree -Zw
bind-key f command-prompt -p "Find window" "find-window '%%'"

# Surface background window activity
setw -g monitor-activity on

##### COPY MODE #####

# Enter copy mode quickly
bind Enter copy-mode

# Vi-style copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

##### QUALITY OF LIFE #####

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"


##### STATUS / THEME #####


##### SESSION PERSISTENCE #####

set -g @continuum-restore 'on'

##### PLUGINS #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'seanmckenzie428/rose-pine-tmux'

set -g @rose_pine_variant 'auto'

##### TPM #####

# Keep TPM near the bottom so plugin setup happens first
run '~/.tmux/plugins/tpm/tpm'

